# TestFlight deploy for Singularity Inc. (Capacitor: web build → cap sync → sign → upload).
#
# This is a THIN CALLER only. All build / signing (fastlane match) / upload
# logic lives in the shared reusable pipeline in Wrexist/ios-certificates.
# See that repo's TESTFLIGHT.md for the full runbook and inputs reference.
#
# Trigger from the Actions tab → iOS TestFlight → Run workflow:
#   - leave marketing_version blank to ship as default_version below
#   - or type e.g. 1.2.0 to start a new version line for that run.

name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: 'Marketing version, e.g. 1.2.0. Leave blank to use the default_version set in this file.'
        required: false
        type: string
        default: ''

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  testflight:
    uses: Wrexist/ios-certificates/.github/workflows/testflight.yml@master
    secrets: inherit
    with:
      project_type: capacitor
      scheme: App
      xcode_project: ios/App/App.xcodeproj
      bundle_map: '{"App": "com.wrexist.singularityinc"}'
      # Certs live on the isolated new-apps branch — dynasty-manager and
      # Peptide-ai certs (on the default branch) are never touched.
      match_branch: new-apps
      # Version shipped when the run-workflow box is left blank. Bump here for
      # a new version (plays the package.json.version role); typing a version
      # in the run-workflow box overrides it for that run.
      default_version: '1.0.0'
      marketing_version: ${{ inputs.marketing_version }}
