<?xml version="1.0" encoding="UTF-8"?>
<!-- Singularity Inc. — App Store icon concept (1024×1024). Parametric, on-brand.
     A single glowing server rack (the hall's signature object) on the dark room
     gradient, with a coral "singularity" spark. Render to 1024 PNG (no alpha,
     square — Apple masks the corners). Starting point; refine in Figma. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1124"/>
      <stop offset="1" stop-color="#161d38"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0" stop-color="#2f7bf6" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#2f7bf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#34d27e" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#34d27e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Opaque background (no transparency for App Store icons) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Floor light-spill pool under the rack -->
  <ellipse cx="512" cy="740" rx="320" ry="120" fill="url(#pool)"/>

  <!-- Isometric server rack (top / left / right faces) -->
  <!-- right face (front, darkest) -->
  <polygon points="512,715 742,600 742,300 512,415" fill="#2b60c0"/>
  <!-- left face (front, mid) -->
  <polygon points="282,600 512,715 512,415 282,300" fill="#3f86f0"/>
  <!-- top face (lightest) -->
  <polygon points="282,300 512,185 742,300 512,415" fill="#7db4ff"/>

  <!-- Rim light on the top ridges -->
  <polyline points="282,300 512,185 742,300" fill="none" stroke="#dcebff" stroke-width="6" stroke-opacity="0.5"/>

  <!-- Glowing server LEDs on the front-right face -->
  <g fill="#6ee7a8">
    <rect x="556" y="430" width="120" height="20" rx="6" transform="skewY(-26.57)" opacity="0.95"/>
    <rect x="556" y="500" width="120" height="20" rx="6" transform="skewY(-26.57)" opacity="0.7"/>
    <rect x="556" y="570" width="120" height="20" rx="6" transform="skewY(-26.57)" opacity="0.95"/>
    <rect x="556" y="640" width="120" height="20" rx="6" transform="skewY(-26.57)" opacity="0.6"/>
  </g>

  <!-- The "singularity" spark (brand coral) hovering above the rack -->
  <circle cx="512" cy="150" r="46" fill="#ff385c" opacity="0.25"/>
  <circle cx="512" cy="150" r="20" fill="#ff5a3c"/>
  <circle cx="512" cy="150" r="9" fill="#ffd9cf"/>
</svg>
